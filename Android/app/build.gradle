def buildAsLibrary = project.hasProperty('BUILD_AS_LIBRARY');
def buildAsApplication = !buildAsLibrary
def androidAppVersionName = "9.2.3-nei-alpha3-android.beta.1"
if (buildAsApplication) {
    apply plugin: 'com.android.application'
}
else {
    apply plugin: 'com.android.library'
}

android {
    ndkVersion "26.0.10792818"
    namespace 'com.dishii.soh'
    compileSdkVersion 31
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        if (buildAsApplication) {
            applicationId "com.linkzenic.sohnei"
        }
        minSdkVersion 24
        targetSdkVersion 33
        versionCode 14
        versionName androidAppVersionName
    }
    signingConfigs {
        release {
            def releaseStoreFile = project.findProperty('storeFile')
            if (releaseStoreFile) {
                storeFile file(releaseStoreFile)
                storePassword project.findProperty('storePassword')
                keyAlias project.findProperty('keyAlias')
                keyPassword project.findProperty('keyPassword')
            }
        }
    }
    buildTypes {
        debug {
            externalNativeBuild {
                cmake {
                    arguments "-DSDL_SHARED=ON", "-DANDROID_STL=c++_static", "-DHAVE_LD_VERSION_SCRIPT=OFF",'-DUSE_OPENGLES=ON', "-DBUILD_REMOTE_CONTROL=1", "-DANDROID_APP_VERSION_NAME=${androidAppVersionName}"
                    abiFilters 'arm64-v8a'
                }
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        release {
            minifyEnabled false
            debuggable false
            jniDebuggable false
            signingConfig signingConfigs.release
            externalNativeBuild {
                cmake {
                    arguments "-DSDL_SHARED=ON", "-DANDROID_STL=c++_static", "-DHAVE_LD_VERSION_SCRIPT=OFF",'-DUSE_OPENGLES=ON', "-DBUILD_REMOTE_CONTROL=1", "-DANDROID_APP_VERSION_NAME=${androidAppVersionName}"
                    abiFilters 'arm64-v8a'
                }
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    applicationVariants.all { variant ->
        tasks["merge${variant.name.capitalize()}Assets"]
            .dependsOn("externalNativeBuild${variant.name.capitalize()}")
        variant.outputs.all { output ->
            def projectName = rootProject.name
            def buildType = variant.buildType.name
            def versionName = variant.versionName
            def versionCode = variant.versionCode

            def gitTag = System.getenv("GIT_TAG") ?: "v${versionName}"
            def newApkName = "sohnei_${buildType}_${gitTag}.apk"
            outputFileName = newApkName
        }
    }
    if (!project.hasProperty('EXCLUDE_NATIVE_LIBS')) {
        sourceSets.main {
            jniLibs.srcDir 'libs'
        }
        externalNativeBuild {
            //ndkBuild {
            //    path 'jni/Android.mk'
            //}
            cmake {
                 path '../../CMakeLists.txt'
                 version "3.31.5"
            }
        }
    }
    lintOptions {
        abortOnError false
    }
    if (buildAsLibrary) {
        libraryVariants.all { variant ->
            variant.outputs.each { output ->
                def outputFile = output.outputFile
                if (outputFile != null && outputFile.name.endsWith(".aar")) {
                    def fileName = "org.libsdl.app.aar";
                    output.outputFile = new File(outputFile.parent, fileName);
                }
            }
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.core:core:1.7.0' // Use the latest version
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}

task wrapper(type: Wrapper) {
    gradleVersion = '8.10.2'
}

tasks.register("applyLibultrashipAndroidPatch") {
    doLast {
        def libultrashipDir = file("${rootProject.projectDir}/../libultraship")
        def contextFile = file("${libultrashipDir}/src/ship/Context.cpp")
        if (contextFile.text.contains("sAndroidDataRootPath")) {
            return
        }

        exec {
            workingDir libultrashipDir
            commandLine "git", "apply", "--ignore-whitespace", "--whitespace=nowarn",
                    "../patches/libultraship-android-data-root.patch"
        }
    }
}

tasks.register("applyZapdtrAndroidPatch") {
    doLast {
        def zapdtrDir = file("${rootProject.projectDir}/../ZAPDTR")
        def crashHandlerFile = file("${zapdtrDir}/ZAPD/CrashHandler.cpp")
        def originalGuard = "#if __has_include(<unistd.h>)"
        def androidGuard = "#if __has_include(<unistd.h>) && !defined(__ANDROID__)"
        def source = crashHandlerFile.text
        if (source.contains(androidGuard)) {
            return
        }
        if (!source.contains(originalGuard)) {
            throw new GradleException("Unexpected ZAPDTR CrashHandler POSIX guard")
        }
        crashHandlerFile.text = source.replace(originalGuard, androidGuard)
    }
}

tasks.register("applyOtrExporterAndroidPatch") {
    doLast {
        def otrExporterDir = file("${rootProject.projectDir}/../OTRExporter")
        def cmakeFile = file("${otrExporterDir}/OTRExporter/CMakeLists.txt")
        def linkMarker = 'target_link_libraries(${PROJECT_NAME} PUBLIC spdlog::spdlog)'
        def androidLink = 'target_link_libraries(${PROJECT_NAME} PUBLIC libultraship tinyxml2::tinyxml2 libzip::zip)'
        def source = cmakeFile.text
        if (source.contains(androidLink)) {
            return
        }
        if (!source.contains(linkMarker)) {
            throw new GradleException("Unexpected OTRExporter spdlog linkage")
        }
        def newline = source.contains("\r\n") ? "\r\n" : "\n"
        def androidDependencies = [
                linkMarker,
                "",
                "# OTRExporter consumes resource types and archive APIs from libultraship.",
                "# Linking the owning targets propagates generated dependency includes on Android.",
                "find_package(libzip REQUIRED)",
                androidLink
        ].join(newline)
        cmakeFile.text = source.replace(linkMarker, androidDependencies)
    }
}

tasks.configureEach { task ->
    if (task.name.startsWith("configureCMake") ||
            task.name.startsWith("buildCMake") ||
            task.name.startsWith("externalNativeBuild")) {
        task.dependsOn("applyLibultrashipAndroidPatch", "applyZapdtrAndroidPatch",
                "applyOtrExporterAndroidPatch")
    }
}

task prepareKotlinBuildScriptModel {
}
