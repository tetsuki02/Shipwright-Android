name: Android Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: djvdw7f2ro/android-builder-soh:v1.0.1
    permissions:
      id-token: write
      attestations: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Write local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > Android/local.properties
          echo "ndk.dir=${ANDROID_NDK_HOME}" >> Android/local.properties

      - name: Build release APK
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: cd Android && ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK=$(find Android/app/build/outputs/apk/release -name 'soh_release_*.apk' | head -1)
          mv "$APK" "soh-${{ github.ref_name }}.apk"

      - name: Compute SHA256
        id: sha256
        run: |
          HASH=$(sha256sum "soh-${{ github.ref_name }}.apk" | awk '{print $1}')
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: soh-${{ github.ref_name }}.apk

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          OBJ_TYPE=$(git tag -l --format='%(objecttype)' "${TAG}")
          if [ "${OBJ_TYPE}" != "tag" ]; then
            echo "ERROR: '${TAG}' is a lightweight tag. Push an annotated tag to trigger a release."
            exit 1
          fi

          ANNOTATION_BODY=$(git tag -l --format='%(contents:body)' "${TAG}")
          if [ -z "${ANNOTATION_BODY}" ]; then
            ANNOTATION_BODY="## Changes
- Built from ${TAG} via CI"
          fi

          FOOTER="SHA256: ${{ steps.sha256.outputs.hash }}
Verify: \`gh attestation verify soh-${TAG}.apk --owner please-be-nice\`
Build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          printf '%s\n\n%s\n' "${ANNOTATION_BODY}" "${FOOTER}" > /tmp/release-notes.md

          gh release create "${TAG}" \
            "soh-${TAG}.apk" \
            --title "${TAG}" \
            --notes-file /tmp/release-notes.md
